  <rect x="1070" y="240" width="430" height="520" rx="24" fill="white" stroke="#E2E8F0" stroke-width="3"/>
  <circle cx="1130" cy="320" r="32" fill="#3B82F6"/><text x="1130" y="330" text-anchor="middle" font-size="28" font-family="Inter, Arial" font-weight="700" fill="white">3</text>
  <text x="1100" y="395" font-size="34" font-family="Inter, Arial" font-weight="700" fill="#162542">First Snapshot</text>
