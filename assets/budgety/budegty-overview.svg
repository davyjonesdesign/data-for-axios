  <text x="70" y="145" font-size="28" font-family="Inter, Arial, sans-serif" fill="#475569">Onboarding to first monthly budget setup</text>

  <rect x="90" y="240" width="430" height="520" rx="24" fill="white" stroke="#E2E8F0" stroke-width="3"/>
  <circle cx="150" cy="320" r="32" fill="#3B82F6"/><text x="150" y="330" text-anchor="middle" font-size="28" font-family="Inter, Arial" font-weight="700" fill="white">1</text>
  <text x="120" y="395" font-size="34" font-family="Inter, Arial" font-weight="700" fill="#162542">Connect Accounts</text>
  <text x="120" y="450" font-size="24" font-family="Inter, Arial" fill="#475569">Link checking and cards securely</text>

  <rect x="580" y="240" width="430" height="520" rx="24" fill="white" stroke="#E2E8F0" stroke-width="3"/>
  <circle cx="640" cy="320" r="32" fill="#3B82F6"/><text x="640" y="330" text-anchor="middle" font-size="28" font-family="Inter, Arial" font-weight="700" fill="white">2</text>
